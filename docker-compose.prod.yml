version: "3.9"

# 生产环境配置（覆盖 docker-compose.yml）
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    # 生产环境不挂载代码卷，使用镜像内的代码
    volumes: []
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --log-level info
    environment:
      DEBUG: "false"
      LOG_LEVEL: INFO
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
