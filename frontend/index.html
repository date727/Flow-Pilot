<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Flow-Pilot - 任务编排 Agent 框架</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --accent-color: #0070f3;
            --accent-hover: #0051cc;
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #000000;
                --bg-secondary: #1a1a1a;
                --text-primary: #ffffff;
                --text-secondary: #a0a0a0;
                --border-color: #333333;
            }
            html {
                color-scheme: dark;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            padding-bottom: env(safe-area-inset-bottom);
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-wrap: balance;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .main-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        textarea,
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.2s;
            touch-action: manipulation;
        }

        textarea:focus-visible,
        input[type="text"]:focus-visible {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 112, 243, 0.1);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        button:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background-color: var(--border-color);
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        .status-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }

        .status-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
        }

        .status-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning-color);
        }

        .output-area {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 0.875rem;
            white-space: pre-wrap;
            word-break: break-words;
        }

        .loading {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @media (prefers-reduced-motion: reduce) {
            .loading {
                animation: none;
                border-top-color: var(--accent-color);
            }
            button {
                transition: none;
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tools-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .tool-item {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .tool-item:last-child {
            border-bottom: none;
        }

        .tool-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .tool-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            border-left: 3px solid var(--error-color);
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 2rem;
        }

        .progress-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .progress-bar .step {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            background: var(--border-color);
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .progress-bar .step.active {
            background: var(--accent-color);
            color: #fff;
            animation: pulse 1s ease-in-out infinite;
        }

        .progress-bar .step.done {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success-color);
        }

        .progress-bar .step.error-step {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error-color);
        }

        .step-icon::before {
            content: '○';
            font-style: normal;
        }

        .step.active .step-icon::before {
            content: '◉';
        }

        .step.done .step-icon::before {
            content: '✓';
        }

        .step.error-step .step-icon::before {
            content: '✗';
        }

        .step-arrow {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #stream-output {
            min-height: 60px;
            max-height: 300px;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--accent-color);
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            border-radius: 0 0 4px 0;
        }

        .skip-link:focus {
            top: 0;
        }

        #main-content {
            scroll-margin-top: 2rem;
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">跳转到主内容</a>
    
    <div class="container">
        <header>
            <h1>Flow-Pilot</h1>
            <p class="subtitle">基于 MCP 协议与 Reflexion 工作流的异构任务编排 Agent 框架</p>
        </header>

        <main id="main-content" class="main-grid">
            <section class="card">
                <h2>提交任务</h2>
                <form id="task-form">
                    <div class="form-group">
                        <label for="task-input">任务描述</label>
                        <textarea 
                            id="task-input" 
                            name="input"
                            placeholder="描述您的任务…"
                            required
                            autocomplete="off"
                            spellcheck="true"
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="thread-id">会话 ID（可选）</label>
                        <input 
                            type="text" 
                            id="thread-id" 
                            name="thread_id"
                            placeholder="留空自动生成…"
                            autocomplete="off"
                            spellcheck="false"
                        />
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary" id="submit-btn">
                            提交任务
                        </button>
                        <button type="button" class="btn-secondary" id="clear-btn">
                            清空
                        </button>
                    </div>
                </form>

                <div id="output-section" style="margin-top: 2rem; display: none;">
                    <h2>执行进度</h2>
                    <div id="progress" class="progress-bar">
                        <span class="step" data-node="planner"><span class="step-icon"></span> 规划</span>
                        <span class="step-arrow">→</span>
                        <span class="step" data-node="executor"><span class="step-icon"></span> 执行</span>
                        <span class="step-arrow">→</span>
                        <span class="step" data-node="tools"><span class="step-icon"></span> 工具</span>
                        <span class="step-arrow">→</span>
                        <span class="step" data-node="critic"><span class="step-icon"></span> 评审</span>
                    </div>
                    <div id="stream-output" class="output-area" role="log" aria-live="polite"></div>
                    <h2 style="margin-top: 1.5rem;">最终结果</h2>
                    <div id="output" class="output-area" role="log" aria-live="polite"></div>
                </div>

                <div id="error-section"></div>
            </section>

            <aside>
                <section class="card">
                    <h2>系统状态</h2>
                    <div id="health-status">
                        <p class="empty-state">加载中…</p>
                    </div>
                </section>

                <section class="card" style="margin-top: 1rem;">
                    <h2>可用工具</h2>
                    <div id="tools-status">
                        <p class="empty-state">加载中…</p>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
