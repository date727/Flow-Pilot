<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Flow-Pilot - 任务编排 Agent 框架</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #ebebeb;
            --text-primary: #000000;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #e0e0e0;
            --accent-color: #0070f3;
            --accent-hover: #0051cc;
            --accent-light: rgba(0,112,243,0.08);
            --success-color: #10b981;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
            --user-bubble: #0070f3;
            --user-bubble-text: #ffffff;
            --ai-bubble: #f0f0f0;
            --ai-bubble-text: #000000;
            --header-height: 52px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #111111;
                --bg-secondary: #1a1a1a;
                --bg-tertiary: #252525;
                --text-primary: #e0e0e0;
                --text-secondary: #999999;
                --text-tertiary: #666666;
                --border-color: #2a2a2a;
                --accent-light: rgba(0,112,243,0.12);
                --ai-bubble: #252525;
                --ai-bubble-text: #e0e0e0;
            }
            html { color-scheme: dark; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Layout ─────────────────────────────────── */
        .app-shell {
            display: grid;
            grid-template-columns: 260px 1fr 280px;
            grid-template-rows: var(--header-height) 1fr;
            grid-template-areas:
                "header header header"
                "threads chat sidebar";
            height: 100vh;
            gap: 1px;
            background: var(--border-color);
        }

        @media (max-width: 1024px) {
            .app-shell {
                grid-template-columns: 1fr;
                grid-template-rows: var(--header-height) auto 1fr;
                grid-template-areas:
                    "header"
                    "threads"
                    "chat";
            }
            .right-sidebar { display: none; }
        }

        @media (max-width: 640px) {
            .thread-panel { max-height: 120px; overflow-y: auto; }
        }

        /* ── Header ─────────────────────────────────── */
        .app-header {
            grid-area: header;
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            gap: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }
        .app-header h1 { font-size: 1.1rem; font-weight: 700; white-space: nowrap; }
        .app-header .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success-color); flex-shrink: 0; }
        .app-header .dot.offline { background: var(--error-color); }
        .app-header .subtitle {
            font-size: 0.8rem; color: var(--text-tertiary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ── Thread Panel ────────────────────────────── */
        .thread-panel {
            grid-area: threads;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .thread-panel-header {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .btn-new-chat {
            width: 100%;
            padding: 0.6rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            text-align: left;
            transition: background 0.15s;
        }
        .btn-new-chat:hover { background: var(--accent-light); }
        .thread-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .thread-item {
            padding: 0.6rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
            transition: background 0.12s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .thread-item:hover { background: var(--bg-tertiary); }
        .thread-item.active { background: var(--accent-light); color: var(--accent-color); font-weight: 500; }
        .thread-item .tid { font-family: 'SF Mono', 'Monaco', 'Menlo', monospace; font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        .thread-item .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; background: var(--bg-tertiary); flex-shrink: 0; margin-left: 0.5rem; }
        .thread-list .empty { text-align: center; color: var(--text-tertiary); font-size: 0.8rem; padding: 2rem 1rem; }

        /* ── Chat Panel ─────────────────────────────── */
        .chat-panel {
            grid-area: chat;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.25rem;
            scroll-behavior: smooth;
            overscroll-behavior: contain;
        }
        .chat-messages .empty-chat {
            display: flex; align-items: center; justify-content: center;
            height: 100%; color: var(--text-tertiary); font-size: 0.9rem;
            text-align: center; padding: 2rem;
        }
        .msg-row {
            display: flex;
            margin-bottom: 1rem;
            animation: fadeIn 0.2s ease;
        }
        .msg-row.user { justify-content: flex-end; }
        .msg-row.assistant { justify-content: flex-start; }
        .msg-row.tool { justify-content: center; }

        .msg-bubble {
            max-width: 75%;
            padding: 0.65rem 0.9rem;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.55;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .msg-row.user .msg-bubble {
            background: var(--user-bubble);
            color: var(--user-bubble-text);
            border-bottom-right-radius: 4px;
        }
        .msg-row.assistant .msg-bubble {
            background: var(--ai-bubble);
            color: var(--ai-bubble-text);
            border-bottom-left-radius: 4px;
        }
        .msg-row.tool .msg-bubble {
            background: transparent;
            color: var(--text-tertiary);
            font-size: 0.75rem;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            padding: 0.25rem 0.5rem;
            max-width: 90%;
            text-align: center;
        }
        .msg-row .tool-tag {
            display: inline-block;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7rem;
            margin-right: 0.3rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Progress bar in chat ───────────────────── */
        .progress-inline {
            display: flex; gap: 0.35rem; align-items: center;
            padding: 0.5rem 0.75rem; font-size: 0.75rem;
            flex-wrap: wrap;
        }
        .progress-inline .pi-step {
            padding: 0.2rem 0.5rem; border-radius: 4px;
            background: var(--bg-tertiary); color: var(--text-tertiary);
        }
        .progress-inline .pi-step.active { background: var(--accent-color); color: #fff; }
        .progress-inline .pi-step.done { background: rgba(16,185,129,0.15); color: var(--success-color); }
        .progress-inline .pi-arrow { color: var(--text-tertiary); font-size: 0.65rem; }

        /* ── Chat Input ─────────────────────────────── */
        .chat-input-bar {
            padding: 0.75rem 1.25rem;
            border-top: 1px solid var(--border-color);
            background: var(--bg-primary);
            flex-shrink: 0;
        }
        .chat-input-bar form { display: flex; gap: 0.5rem; }
        .chat-input-bar textarea {
            flex: 1;
            padding: 0.65rem 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: none;
            rows: 1;
            max-height: 120px;
            transition: border-color 0.2s;
        }
        .chat-input-bar textarea:focus-visible {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0,112,243,0.1);
        }
        .btn-send {
            padding: 0.65rem 1.1rem;
            border: none;
            border-radius: 10px;
            background: var(--accent-color);
            color: #fff;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .btn-send:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Right Sidebar ──────────────────────────── */
        .right-sidebar {
            grid-area: sidebar;
            background: var(--bg-secondary);
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .side-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
        }
        .side-card h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; }
        .side-card .status-row { font-size: 0.8rem; padding: 0.3rem 0; display: flex; justify-content: space-between; color: var(--text-secondary); }
        .side-card .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; }
        .side-card .status-dot.ok { background: var(--success-color); }
        .side-card .status-dot.warn { background: var(--warning-color); }
        .side-card .status-dot.err { background: var(--error-color); }
        .tool-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .tool-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--border-color); font-size: 0.78rem; }
        .tool-list li:last-child { border-bottom: none; }
        .tool-list .tname { font-weight: 600; color: var(--text-primary); }
        .tool-list .tdesc { color: var(--text-tertiary); font-size: 0.7rem; margin-top: 0.15rem; }

        /* ── Misc ───────────────────────────────────── */
        .skip-link { position: absolute; top: -40px; left: 0; background: var(--accent-color); color: white; padding: 0.5rem 1rem; text-decoration: none; border-radius: 0 0 4px 0; z-index: 100; }
        .skip-link:focus { top: 0; }
        .loading-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); animation: blink 1s ease-in-out infinite; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
        button, .thread-item { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        button:focus-visible, textarea:focus-visible { outline: 2px solid var(--accent-color); outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) {
            .msg-row { animation: none; }
            .loading-dot { animation: none; opacity: 0.5; }
        }
    </style>
</head>
<body>
    <a href="#chat-input" class="skip-link">跳转到输入框</a>

    <div class="app-shell">
        <!-- Header -->
        <header class="app-header">
            <span class="dot" id="health-dot" title="系统状态"></span>
            <h1>Flow-Pilot</h1>
            <span class="subtitle">任务编排 Agent 框架</span>
        </header>

        <!-- Thread List -->
        <nav class="thread-panel" aria-label="会话列表">
            <div class="thread-panel-header">
                <button class="btn-new-chat" id="btn-new-chat" title="新建对话">
                    + 新建对话
                </button>
            </div>
            <div class="thread-list" id="thread-list" role="listbox" aria-label="历史会话">
                <p class="empty">暂无对话</p>
            </div>
        </nav>

        <!-- Chat Area -->
        <main class="chat-panel" id="main-content">
            <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="对话消息">
                <div class="empty-chat">
                    <p>选择或新建一个对话开始</p>
                </div>
            </div>
            <div class="chat-input-bar">
                <form id="chat-form" autocomplete="off">
                    <textarea
                        id="chat-input"
                        placeholder="输入你的任务或问题…"
                        rows="1"
                        autocomplete="off"
                        spellcheck="true"
                        aria-label="输入消息"
                    ></textarea>
                    <button type="submit" class="btn-send" id="send-btn" disabled>
                        发送
                    </button>
                </form>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="right-sidebar" aria-label="系统信息">
            <div class="side-card">
                <h3>系统状态</h3>
                <div id="health-status">
                    <p style="color:var(--text-tertiary);font-size:0.8rem;">加载中…</p>
                </div>
            </div>
            <div class="side-card">
                <h3>可用工具</h3>
                <div id="tools-status">
                    <p style="color:var(--text-tertiary);font-size:0.8rem;">加载中…</p>
                </div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
